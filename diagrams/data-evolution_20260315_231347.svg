<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" width="900" height="580" style="display:block;font-family:Arial,sans-serif;overflow:hidden">
<defs>
  <linearGradient id="HG" x1="0" x2="1" y1="0" y2="0">
    <stop offset="0%" stop-color="#102C69"/>
    <stop offset="100%" stop-color="#184098"/>
  </linearGradient>
