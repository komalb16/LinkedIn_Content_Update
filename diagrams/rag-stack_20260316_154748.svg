text x="187" y="407" text-anchor="middle" fill="white" font-size="12" font-weight="900">2</text><text x="450" y="397" text-anchor="middle" fill="#04875E" font-size="13" font-weight="800">Integration</text><text x="450" y="414" text-anchor="middle" fill="#475569" font-size="9.5">Third-party services, messaging, and events</text><polygon points="98,451 802,451 865,542 35,542" fill="#F8E6D2" stroke="#D97706" stroke-width="1.8" class="fi" style="animation-delay:0.36s"/><polygon points="98,451 106,451 43,542 35,542" fill="#D97706"/><circle cx="124" cy="496" r="13" fill="#D97706"/><text x="124" y="501" text-anchor="middle" fill="white" font-size="12" font-weight="900">1</text><text x="450" y="491" text-anchor="middle" fill="#C36B05" font-size="13" font-weight="800">User / Client</text><text x="450" y="508" text-anchor="middle" fill="#475569" font-size="9.5">Web, mobile, and CLI consumers</text>
