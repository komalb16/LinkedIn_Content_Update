name: Tests & Code Quality

on:
  push:
    branches: [ main ]        # ← only fires AFTER merge to main, not on PR
  schedule:
    - cron: '0 2 * * *'       # daily health check at 2 AM UTC

env:
  PYTHON_VERSION: '3.11'
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
  LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-mock

    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Check Python syntax
      run: |
        python -m py_compile src/agent.py
        python -m py_compile src/diagram_generator.py
        python -m py_compile src/linkedin_poster.py
        python -m py_compile src/topic_manager.py

    - name: Run tests & Generate coverage report
      run: |
        pytest -v --tb=short --cov=src --cov-report=xml --cov-report=term-missing

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  code-quality:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pylint mypy bandit

    - name: Lint with pylint
      run: |
        pylint src/ --exit-zero --max-line-length=127 || true

    - name: Type check with mypy
      run: |
        mypy src/ --ignore-missing-imports || true

    - name: Security check with bandit
      run: |
        bandit -r src/ -ll || true

  build-docker:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: false
        tags: linkedin-content-generator:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  run-agent:
    runs-on: ubuntu-latest
    needs: [test, code-quality]

    # Only run on schedule — never on push, avoids accidental dry-run posts
    if: github.event_name == 'schedule'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run dry-run test
      run: |
        python src/agent.py --dry-run
      continue-on-error: true

    - name: Check post generation
      run: |
        ls -la output_post_*.txt || echo "No posts generated"
      continue-on-error: true

    - name: Archive outputs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-outputs
        path: output_post_*.txt
        retention-days: 7

  publish-results:
    runs-on: ubuntu-latest
    needs: [test, code-quality]
    if: always()

    steps:
    - name: Test summary
      run: |
        echo "✅ Tests completed"
        echo "✅ Code quality checks completed"
        echo "✅ Docker build successful"
