name: 🤖 LinkedIn Agent

permissions:
  contents: write
  actions: read

run-name: >-
  ${{ github.event_name == 'workflow_dispatch' && '🖱️ Manual' || '⏰ Scheduled' }} · ${{ github.event.inputs.dry_run == 'true' && 'dry-run' || 'live' }} · ${{ github.event.inputs.post_mode || 'auto' }} · ${{ github.event.inputs.approved_run_id && format('approved-{0}', github.event.inputs.approved_run_id) || github.event.inputs.topic_id || 'auto' }}

concurrency:
  group: linkedin-agent-${{ github.event_name == 'schedule' && 'scheduled' || github.run_id }}
  cancel-in-progress: true

on:
  # Fires every hour at :00 UTC.  IMPORTANT: GitHub Actions crons are NOT
  # precise — they can be delayed 10-40+ min during peak hours. Do NOT
  # configure post slots at exactly :00 (e.g. 13:00) because the cron meant
  # to fire at 13:00 may arrive at 13:40, which would look like a "skipped" run.
  #
  # schedule_checker.py uses a two-sided window:
  #   LOOKBACK  = 55 min  → catches crons that fire UP TO 55 min AFTER the slot
  #   LOOKAHEAD = 20 min  → catches crons that fire UP TO 20 min BEFORE the slot
  #
  # Combined (-20 min … +55 min) the system tolerates even a 40-min-late cron.
  # Example — slot at 17:45 EST (21:45 UTC):
  #   21:00 cron (fires at ~21:38) → 21:45 is 7 min in future → early-claim ✅
  #   22:00 cron (fires at ~22:40) → 21:45 is 55 min ago     → lock held ✅
  # The slot lock (.post_lock.json) is a second line of defence against double-posts.
  schedule:
    - cron: "0 * * * *"

  workflow_dispatch:
    inputs:
      topic_id:
        description: "Topic ID (leave blank for auto-selection)"
        required: false
        default: ""
        type: string
      dry_run:
        description: "Dry run (generate but don't post)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      post_mode:
        description: "Generation mode"
        required: false
        default: "auto"
        type: choice
        options:
          - "auto"
          - "topic"
          - "story"
          - "interview"
          - "trending"
          - "ai_news"
          - "tools_news"
          - "tech_news"
          - "layoff_news"
      skip_schedule:
        description: "Skip schedule check and post immediately (use carefully — bypasses time guard)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      approved_run_id:
        description: "Approved preview run ID (posts exact preview artifact)"
        required: false
        default: ""
        type: string
      approved_artifact_name:
        description: "Approved preview artifact name"
        required: false
        default: ""
        type: string

jobs:
  post-to-linkedin:
    name: Generate & Post Content
    runs-on: ubuntu-latest
    # No sleeping in the job, so 15 min is plenty for a normal post run.
    # (The old 25 min timeout was killing sleep-based runs before they woke up.)
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 🔧 Install system deps
        if: github.event.inputs.dry_run != 'true'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libcairo2 libpango-1.0-0 libpangocairo-1.0-0 \
            libgdk-pixbuf2.0-0 libffi-dev shared-mime-info

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🧪 Smoke test post rendering
        run: |
          python - <<'EOF'
          import sys
          sys.path.insert(0, "src")
          from agent import _render_linkedin_text

          test1 = "Here is my insight.\n\n```python\nStep 1\nStep 2\nStep 3\n```\n\n💬 Thoughts?\n\n#AI #DevOps"
          result1 = _render_linkedin_text(test1)
          assert "```" not in result1, "FAIL: fenced block not stripped"
          assert "Step 1" in result1, "FAIL: content was lost"
          print("✅ Test 1 passed: fenced block handled correctly")

          test2 = "Simple post.\n\n💬 Thoughts?\n\n#AI"
          result2 = _render_linkedin_text(test2)
          assert result2 == test2.strip(), "FAIL: plain post was modified"
          print("✅ Test 2 passed: plain post unchanged")

          assert _render_linkedin_text("") == "", "FAIL: empty input should return empty"
          print("✅ Test 3 passed: empty input handled")
          print("All smoke tests passed.")
          EOF

      - name: ℹ️ Run Info
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  LinkedIn Agent — © ${{ vars.AUTHOR_NAME || github.actor }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Run time     : $(date '+%Y-%m-%d %H:%M %Z')"
          echo "  Trigger      : ${{ github.event_name }}"
          echo "  Topic        : ${{ github.event.inputs.topic_id || 'auto' }}"
          echo "  Post mode    : ${{ github.event.inputs.post_mode || 'auto' }}"
          echo "  Dry run      : ${{ github.event.inputs.dry_run || 'false' }}"
          echo "  Skip schedule: ${{ github.event.inputs.skip_schedule || 'false' }}"
          echo "  Approved     : ${{ github.event.inputs.approved_run_id || 'no' }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: 🚀 Run LinkedIn Agent
        id: run_agent
        working-directory: src
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || vars.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || vars.TELEGRAM_CHAT_ID }}
          AUTHOR_NAME: ${{ vars.AUTHOR_NAME || github.actor }}
          USER_NAME: ${{ vars.USER_NAME || vars.AUTHOR_NAME || github.actor }}
          GH_EVENT_NAME: ${{ github.event_name }}
          # 55 min window < 60 min cron interval — prevents double-posting.
          # Two consecutive hourly crons can never both match the same slot.
          SCHEDULE_WINDOW_MINUTES: "119"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          if [ -n "${{ github.event.inputs.approved_run_id }}" ] && [ "${{ github.event.inputs.dry_run }}" != "true" ]; then
            python post_approved_preview.py \
              --run-id "${{ github.event.inputs.approved_run_id }}" \
              --artifact-name "${{ github.event.inputs.approved_artifact_name }}"
          else
            ARGS=""
            if [ -n "${{ github.event.inputs.topic_id }}" ]; then
              ARGS="$ARGS --topic ${{ github.event.inputs.topic_id }}"
            fi
            if [ -n "${{ github.event.inputs.post_mode }}" ] && [ "${{ github.event.inputs.post_mode }}" != "auto" ]; then
              ARGS="$ARGS --mode ${{ github.event.inputs.post_mode }}"
            fi
            if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
              ARGS="$ARGS --dry-run"
            fi
            # --manual only when explicitly requested via skip_schedule=true.
            # workflow_dispatch alone does NOT bypass the schedule — this
            # prevents accidental double-posts from stray "Run workflow" clicks.
            if [ "${{ github.event.inputs.skip_schedule }}" = "true" ]; then
              ARGS="$ARGS --manual"
            fi
            python agent.py $ARGS
          fi

      - name: "✅ Posted · ${{ steps.run_agent.outputs.POSTED_TITLE || steps.run_agent.outputs.POSTED_TOPIC || 'unknown' }}"
        if: steps.run_agent.outputs.POSTED_TOPIC != '' && github.event.inputs.dry_run != 'true'
        run: |
          echo "Topic: ${{ steps.run_agent.outputs.POSTED_TOPIC }}"
          echo "Title: ${{ steps.run_agent.outputs.POSTED_TITLE }}"
          echo "Date:  ${{ steps.run_agent.outputs.POSTED_DATE }}"
          echo "URL:   ${{ steps.run_agent.outputs.POSTED_URL }}"

      - name: 🧪 Publish Preview Cache
        if: success() && github.event.inputs.dry_run == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          python src/publish_preview_cache.py

      - name: 📁 Upload Diagrams
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagrams-${{ github.run_number }}
          path: |
            src/diagrams/*.svg
            src/diagrams/*.png
            src/diagrams/*.gif
            src/output_post_*.txt
            src/preview_payload_*.json
            src/agent.log
          retention-days: 30

      - name: 💾 Save Topic History
        if: success()
        run: |
          git config user.name "linkedin-agent[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ "${{ github.event.inputs.dry_run }}" != "true" ]; then
            git add src/.topic_history.json || true
          fi
          git add src/.post_lock.json || true
          git add src/.post_memory.json || true
          git add src/.diagram_memory.json || true
          git add src/.diagram_rotation.json || true
          git diff --staged --quiet || git commit -m "chore: update topic history [skip ci]"
          git pull --rebase origin main || true
          git push || true

      - name: 📝 Update GitHub Profile README
        if: success() && github.event.inputs.dry_run != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          POST_TOPIC:   ${{ steps.run_agent.outputs.POSTED_TOPIC }}
          POST_DATE:    ${{ steps.run_agent.outputs.POSTED_DATE }}
          LINKEDIN_POST_URL: ${{ steps.run_agent.outputs.POSTED_URL }}
          NOTIFY_EMAIL:        ${{ secrets.NOTIFY_EMAIL || vars.NOTIFY_EMAIL }}
          NOTIFY_EMAIL_PASS:   ${{ secrets.NOTIFY_EMAIL_PASS || vars.NOTIFY_EMAIL_PASS || secrets.NOTIFY_EMAIL_PASSWORD || vars.NOTIFY_EMAIL_PASSWORD }}
          NOTIFY_TO_EMAIL:     ${{ secrets.NOTIFY_TO_EMAIL || vars.NOTIFY_TO_EMAIL }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN || vars.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID || vars.TELEGRAM_CHAT_ID }}
        run: |
          python src/update_profile_readme.py || echo "::warning::Profile README update failed (non-fatal)"

      - name: 🔐 Check Token Expiry
        if: always() && github.event.inputs.dry_run != 'true'
        env:
          LINKEDIN_TOKEN_DATE: ${{ secrets.LINKEDIN_TOKEN_DATE }}
          FORCE_NOTIFY:        ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
          NOTIFY_EMAIL:        ${{ secrets.NOTIFY_EMAIL || vars.NOTIFY_EMAIL }}
          NOTIFY_EMAIL_PASS:   ${{ secrets.NOTIFY_EMAIL_PASS || vars.NOTIFY_EMAIL_PASS || secrets.NOTIFY_EMAIL_PASSWORD || vars.NOTIFY_EMAIL_PASSWORD }}
          NOTIFY_TO_EMAIL:     ${{ secrets.NOTIFY_TO_EMAIL || vars.NOTIFY_TO_EMAIL }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN || vars.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID || vars.TELEGRAM_CHAT_ID }}
        run: |
          python src/check_token_expiry.py

      - name: ❌ Notify on Failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || vars.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID || vars.TELEGRAM_CHAT_ID }}
        run: |
          echo "::error::LinkedIn Agent failed! Check the logs above."
          echo "::error::Common causes: expired LinkedIn token, API rate limits, SVG parse error"
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            MSG="%E2%9D%8C+LinkedIn+Agent+FAILED%0ARun:+${{ github.run_id }}%0ATrigger:+${{ github.event_name }}%0ATopic:+${{ github.event.inputs.topic_id || 'auto' }}%0AMode:+${{ github.event.inputs.post_mode || 'auto' }}%0ALink:+https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}&text=${MSG}" > /dev/null || true
          fi
