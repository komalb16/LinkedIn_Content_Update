name: LinkedIn Agent Komal Batra

on:
  schedule:
    - cron: "30 3 * * *"
    - cron: "30 12 * * *"
  workflow_dispatch:
    inputs:
      topic_id:
        description: "Topic ID (blank for auto)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - llm-architecture
          - ai-agents-2025
          - mlops-pipeline
          - rag-systems
          - kubernetes-mastery
          - docker-cheatsheet
          - aws-architecture
          - cicd-pipelines
          - system-design
          - api-design
          - git-workflow
          - solid-principles
          - zero-trust
          - devsecops
          - data-lakehouse
          - kafka-streaming
      dry_run:
        description: "Dry run - generate but do not post"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  post-to-linkedin:
    name: Generate and Post Content
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system deps
        run: sudo apt-get update -q && sudo apt-get install -y libcairo2 libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf2.0-0 libffi-dev shared-mime-info

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run LinkedIn Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          TOPIC_ID: ${{ github.event.inputs.topic_id }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          ARGS=""
          if [ -n "$TOPIC_ID" ]; then ARGS="$ARGS --topic $TOPIC_ID"; fi
          if [ "$DRY_RUN" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python agent.py $ARGS

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-${{ github.run_number }}
          path: |
            diagrams/
            output_post_*.txt
            agent.log
          retention-days: 30
