name: LinkedIn Content Agent

# ─────────────────────────────────────────────────────────────────────────────
# Runs once daily. The workflow cron fires at 3:00 AM UTC (8:30 AM IST).
# schedule_checker.py then sleeps until the per-day time in schedule_config.json.
# Supports manual trigger with optional topic and dry-run.
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # 3:00 AM UTC = 8:30 AM IST — fires early so schedule_checker can sleep
    # until your configured time (e.g. 09:30 IST = 04:00 UTC).
    # ⚠️  Keep only ONE cron entry — two entries = two posts per day.
    - cron: '0 3 * * *'

  workflow_dispatch:
    inputs:
      topic_id:
        description: 'Topic ID (leave blank for auto-select)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run — generate without posting (true/false)'
        required: false
        default: 'false'

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run LinkedIn Agent
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN:   ${{ secrets.LINKEDIN_PERSON_URN }}
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          NOTIFY_EMAIL:          ${{ secrets.NOTIFY_EMAIL }}
          NOTIFY_EMAIL_PASSWORD: ${{ secrets.NOTIFY_EMAIL_PASSWORD }}
          NOTIFY_TO_EMAIL:       ${{ secrets.NOTIFY_TO_EMAIL }}
          CALLMEBOT_PHONE:       ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY:      ${{ secrets.CALLMEBOT_APIKEY }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # ── Build argument list safely ────────────────────────────────────
          # CRITICAL: Never pass --dry-run "false" — argparse store_true does
          # not accept a value, causing "unrecognized arguments: false" crash.
          # The fix: only include --dry-run flag when explicitly set to "true".
          ARGS=""

          TOPIC="${{ github.event.inputs.topic_id }}"
          if [ -n "$TOPIC" ]; then
            ARGS="$ARGS --topic $TOPIC"
          fi

          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          # Manual (workflow_dispatch) triggers skip the scheduled sleep
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ARGS="$ARGS --manual"
          fi

          python src/agent.py $ARGS
