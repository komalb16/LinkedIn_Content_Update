name: LinkedIn Content Agent
run-name: "LinkedIn Agent · ${{ github.event_name == 'workflow_dispatch' && 'Manual' || 'Scheduled' }} · ${{ github.event.inputs.topic_id || 'auto-topic' }}"

# ─────────────────────────────────────────────────────────────────────────────
# HOW TIMING WORKS:
#   • The cron fires every 30 minutes (*/30 * * * *).
#   • schedule_checker.py checks if NOW is within 30 min of your configured time.
#   • If yes: sleeps the gap, then posts.
#   • If no: exits in ~2 seconds (costs almost no Actions minutes).
#
# TO CHANGE POSTING TIME: just update it in the dashboard — no YAML change needed.
# The */30 cron covers any time you pick automatically.
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # Fires every 30 minutes. schedule_checker.py decides whether to post
    # based on the time configured in your dashboard (schedule_config.json).
    # You NEVER need to update this cron — just change the time in the dashboard.
    - cron: '*/30 * * * *'

  workflow_dispatch:
    inputs:
      topic_id:
        description: 'Topic ID (leave blank for auto-select)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run — generate without posting (true/false)'
        required: false
        default: 'false'

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check schedule timing
        id: sched_check
        if: github.event_name == 'schedule'
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
        run: |
          python - << 'PYEOF2'
          import os, sys
          from datetime import datetime, timezone, timedelta
          import json, pathlib

          cfg_path = pathlib.Path("schedule_config.json")
          if not cfg_path.exists():
              print("No schedule_config.json — skipping timing check")
              sys.exit(0)

          cfg   = json.loads(cfg_path.read_text())
          tz_offset_mins = cfg.get("tz_offset_mins", 330)  # default IST
          sched_time = cfg.get("time", "20:50")
          sched_h, sched_m = map(int, sched_time.split(":"))

          utc_now  = datetime.now(timezone.utc)
          local_now = utc_now + timedelta(minutes=tz_offset_mins)
          target    = local_now.replace(hour=sched_h, minute=sched_m, second=0, microsecond=0)
          diff_secs = (target - local_now).total_seconds()
          WINDOW    = 30 * 60

          gho = os.environ.get("GITHUB_OUTPUT", "")
          if diff_secs > WINDOW or diff_secs < -WINDOW:
              print(f"⏭️  Not posting — diff is {int(diff_secs/60)}m (outside ±30m window). Cancelling run.")
              if gho:
                  open(gho,"a").write("SKIP_RUN=true\n")
          else:
              print(f"✅ Within window ({int(diff_secs/60)}m to go) — will post.")
              if gho:
                  open(gho,"a").write("SKIP_RUN=false\n")
          PYEOF2

      - name: Cancel if not posting time
        if: github.event_name == 'schedule' && steps.sched_check.outputs.SKIP_RUN == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Not posting time — cancelling this run to keep Actions history clean."
          gh run cancel ${{ github.run_id }} --repo ${{ github.repository }} || true
          sleep 5
          exit 0

      - name: Run LinkedIn Agent
        id: run_agent
        if: github.event_name != 'schedule' || steps.sched_check.outputs.SKIP_RUN != 'true'
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN:   ${{ secrets.LINKEDIN_PERSON_URN }}
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          NOTIFY_EMAIL:          ${{ secrets.NOTIFY_EMAIL }}
          NOTIFY_EMAIL_PASSWORD: ${{ secrets.NOTIFY_EMAIL_PASSWORD }}
          NOTIFY_TO_EMAIL:       ${{ secrets.NOTIFY_TO_EMAIL }}
          CALLMEBOT_PHONE:       ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY:      ${{ secrets.CALLMEBOT_APIKEY }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          # ── Expose event name as a real env var so shell can read it ──────
          GH_EVENT_NAME:         ${{ github.event_name }}
        run: |
          ARGS=""

          TOPIC="${{ github.event.inputs.topic_id }}"
          if [ -n "$TOPIC" ]; then
            ARGS="$ARGS --topic $TOPIC"
          fi

          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          # Use the env var (not the expression) — expressions don't always
          # evaluate inside shell if-statements reliably.
          if [ "$GH_EVENT_NAME" = "workflow_dispatch" ]; then
            ARGS="$ARGS --manual"
            echo "✅ Manual trigger detected — will skip schedule sleep"
          else
            echo "⏰ Scheduled trigger — schedule_checker will validate timing"
          fi

          echo "Running: python src/agent.py $ARGS"
          python src/agent.py $ARGS

      # ── Bookmark: topic captured in step name for dashboard display ──────────
      - name: "TOPIC: ${{ steps.run_agent.outputs.POST_TOPIC || 'auto' }}"
        if: always() && (github.event_name != 'schedule' || steps.sched_check.outputs.SKIP_RUN != 'true')
        run: echo "Topic bookmark — readable by dashboard via Jobs API"
