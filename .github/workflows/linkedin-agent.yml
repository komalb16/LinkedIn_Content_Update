name: LinkedIn Agent Komal Batra

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:
    inputs:
      topic_id:
        description: "Topic ID (blank for auto)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - llm-architecture
          - ai-agents-2025
          - mlops-pipeline
          - rag-systems
          - kubernetes-mastery
          - docker-cheatsheet
          - aws-architecture
          - cicd-pipelines
          - system-design
          - api-design
          - git-workflow
          - solid-principles
          - zero-trust
          - devsecops
          - data-lakehouse
          - kafka-streaming
      dry_run:
        description: "Dry run"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  post-to-linkedin:
    name: Generate and Post Content
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: sudo apt-get update -q && sudo apt-get install -y libcairo2 libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf2.0-0 libffi-dev shared-mime-info

      - name: Install dependencies
        run: pip install requests cairosvg schedule

      - name: Run Agent
        working-directory: src
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          TOPIC_ID: ${{ github.event.inputs.topic_id }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          ARGS=""
          if [ -n "$TOPIC_ID" ]; then ARGS="$ARGS --topic $TOPIC_ID"; fi
          if [ "$DRY_RUN" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python agent.py $ARGS

      - name: Save Topic History
        if: always()
        run: |
          git config user.name "LinkedIn Agent Bot"
          git config user.email "agent@github-actions.com"
          git add src/.topic_history.json || true
          git diff --staged --quiet || git commit -m "chore: update topic history [skip ci]"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main || true

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-${{ github.run_number }}
          path: |
            src/diagrams/
            src/output_post_*.txt
            src/agent.log
          retention-days: 30
