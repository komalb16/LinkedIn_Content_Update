name: LinkedIn Content Agent

# ─────────────────────────────────────────────────────────────────────────────
# Runs once daily at 9:30 AM IST (4:00 AM UTC).
# Supports manual trigger with optional topic and dry-run override.
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # 3:00 AM UTC = 8:30 AM IST
    # Fires early enough to cover any per-day time set in schedule_config.json.
    # The schedule_checker.py in agent.py then sleeps until the exact
    # configured time for today (up to ~4 hours).
    # ⚠️  Only ONE cron entry — two entries = two posts per day.
    - cron: '0 3 * * *'

  workflow_dispatch:
    inputs:
      topic_id:
        description: 'Topic ID (leave blank for auto-select)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run — generate without posting'
        required: false
        default: 'false'

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run LinkedIn Agent
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN:   ${{ secrets.LINKEDIN_PERSON_URN }}
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          # ── Notification secrets (optional — add these to enable alerts) ──
          NOTIFY_EMAIL:          ${{ secrets.NOTIFY_EMAIL }}
          NOTIFY_EMAIL_PASSWORD: ${{ secrets.NOTIFY_EMAIL_PASSWORD }}
          NOTIFY_TO_EMAIL:       ${{ secrets.NOTIFY_TO_EMAIL }}
          CALLMEBOT_PHONE:       ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY:      ${{ secrets.CALLMEBOT_APIKEY }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python src/agent.py \
            --topic "${{ github.event.inputs.topic_id || '' }}" \
            --dry-run "${{ github.event.inputs.dry_run || 'false' }}"
