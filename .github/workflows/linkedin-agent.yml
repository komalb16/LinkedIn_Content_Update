name: LinkedIn Content Agent
run-name: "LinkedIn Agent · ${{ github.event_name == 'workflow_dispatch' && 'Manual' || 'Scheduled' }} · ${{ github.event.inputs.topic_id || 'auto-topic' }}"

# ─────────────────────────────────────────────────────────────────────────────
# HOW TIMING WORKS:
#   • The cron fires every 30 minutes (*/30 * * * *).
#   • schedule_checker.py checks if NOW is within 30 min of your configured time.
#   • If yes: sleeps the gap, then posts.
#   • If no: exits in ~2 seconds (costs almost no Actions minutes).
#
# TO CHANGE POSTING TIME: just update it in the dashboard — no YAML change needed.
# The */30 cron covers any time you pick automatically.
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # Fires every 30 minutes. schedule_checker.py decides whether to post
    # based on the time configured in your dashboard (schedule_config.json).
    # You NEVER need to update this cron — just change the time in the dashboard.
    - cron: '*/30 * * * *'

  workflow_dispatch:
    inputs:
      topic_id:
        description: 'Topic ID (leave blank for auto-select)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run — generate without posting (true/false)'
        required: false
        default: 'false'

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run LinkedIn Agent
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN:   ${{ secrets.LINKEDIN_PERSON_URN }}
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          NOTIFY_EMAIL:          ${{ secrets.NOTIFY_EMAIL }}
          NOTIFY_EMAIL_PASSWORD: ${{ secrets.NOTIFY_EMAIL_PASSWORD }}
          NOTIFY_TO_EMAIL:       ${{ secrets.NOTIFY_TO_EMAIL }}
          CALLMEBOT_PHONE:       ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY:      ${{ secrets.CALLMEBOT_APIKEY }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          # ── Expose event name as a real env var so shell can read it ──────
          GH_EVENT_NAME:         ${{ github.event_name }}
        run: |
          ARGS=""

          TOPIC="${{ github.event.inputs.topic_id }}"
          if [ -n "$TOPIC" ]; then
            ARGS="$ARGS --topic $TOPIC"
          fi

          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          # Use the env var (not the expression) — expressions don't always
          # evaluate inside shell if-statements reliably.
          if [ "$GH_EVENT_NAME" = "workflow_dispatch" ]; then
            ARGS="$ARGS --manual"
            echo "✅ Manual trigger detected — will skip schedule sleep"
          else
            echo "⏰ Scheduled trigger — schedule_checker will validate timing"
          fi

          echo "Running: python src/agent.py $ARGS"
          python src/agent.py $ARGS
