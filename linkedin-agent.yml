name: 🤖 LinkedIn Agent — Komal Batra

# ─── Triggers ───────────────────────────────────────────────────────────────
on:
  # Scheduled: Daily at 9 AM IST (3:30 UTC / 22:30 EST/ 19:30 PST)
  schedule:
    - cron: "30 3 * * *"   # 9:00 AM IST  (morning post)

  # Manual trigger from GitHub UI — with optional inputs
  workflow_dispatch:
    inputs:
      topic_id:
        description: "Topic ID (leave blank for auto-selection)"
        required: false
        default: ""
        type: choice
        options:
          - ""                    # auto
          - llm-architecture
          - ai-agents-2025
          - mlops-pipeline
          - rag-systems
          - kubernetes-mastery
          - docker-cheatsheet
          - aws-architecture
          - cicd-pipelines
          - system-design
          - api-design
          - git-workflow
          - solid-principles
          - zero-trust
          - devsecops
          - data-lakehouse
          - kafka-streaming

      dry_run:
        description: "Dry run (generate but don't post)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

# ─── Job ─────────────────────────────────────────────────────────────────────
jobs:
  post-to-linkedin:
    name: Generate & Post Content
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 1. Checkout repository
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. Install system dependencies (for SVG → PNG conversion)
      - name: 🔧 Install system deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libcairo2 libpango-1.0-0 libpangocairo-1.0-0 \
            libgdk-pixbuf2.0-0 libffi-dev shared-mime-info

      # 4. Install Python dependencies
      - name: 📦 Install dependencies
        run: pip install -r requirements.txt
        run: pip install requests cairosvg schedule
      # 5. Show run info
      - name: ℹ️ Run Info
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  LinkedIn Agent — © Komal Batra"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Run time  : $(date '+%Y-%m-%d %H:%M %Z')"
          echo "  Trigger   : ${{ github.event_name }}"
          echo "  Topic     : ${{ github.event.inputs.topic_id || 'auto' }}"
          echo "  Dry run   : ${{ github.event.inputs.dry_run || 'false' }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # 6. Run the agent
      - name: 🚀 Run LinkedIn Agent
        working-directory: src
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          TOPIC_ID: ${{ github.event.inputs.topic_id }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          run: |
          ARGS=""
          
          # Add --topic flag if manually specified
          if [ -n "${{ github.event.inputs.topic_id }}" ]; then
            ARGS="$ARGS --topic ${{ github.event.inputs.topic_id }}"
          fi
          
          # Add --dry-run flag if requested
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          
          python agent.py $ARGS

      # 7. Upload diagrams as artifacts (always, even on failure)
      - name: 📁 Upload Diagrams
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagrams-${{ github.run_number }}
          path: |
            src/diagrams/*.svg
            src/diagrams/*.png
            src/output_post_*.txt
            src/agent.log
          retention-days: 30

      # 8. Commit updated history back to repo
      - name: 💾 Save Topic History
        if: success() && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "LinkedIn Agent"
          git config user.email "agent@komal-batra.dev"
          git add src/.topic_history.json || true
          git diff --staged --quiet || git commit -m "chore: update topic history [skip ci]"
          git push || true

      # 9. Notify on failure
      - name: ❌ Notify on Failure
        if: failure()
        run: |
          echo "::error::LinkedIn Agent failed! Check the logs above."
          echo "::error::Common causes: expired LinkedIn token, API rate limits, SVG parse error"
